services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ceibal_dev
      POSTGRES_USER: ${POSTGRES_USER:-ceibal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ceibal_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ceibal} -d ceibal_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
