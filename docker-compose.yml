services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ceibal_dev
      POSTGRES_USER: ${POSTGRES_USER:-ceibal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ceibal_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ceibal} -d ceibal_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ceibal}:${POSTGRES_PASSWORD:-ceibal_dev_pass}@postgres:5432/ceibal_dev
      ENV: ${ENV:-development}
      CORS_ORIGINS: "http://localhost,http://localhost:80"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GATEWAY_AI_URL: ${GATEWAY_AI_URL}
      GATEWAY_FILE_URL: ${GATEWAY_FILE_URL}
      S3_BUCKET_HANDWRITE: ${S3_BUCKET_HANDWRITE:-ceibal-gateway-file-uploads-dev}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_APP_CLIENT_ID: ${COGNITO_APP_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_COGNITO_USER_POOL_ID: ${VITE_COGNITO_USER_POOL_ID}
        VITE_COGNITO_CLIENT_ID: ${VITE_COGNITO_CLIENT_ID}
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
